{% load static %}<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Super Escola - Sistema de Gestão Académica{% endblock %}</title>
  <meta name="description" content="{% block description %}Simplifique a gestão da sua escola com o Super Escola. Matrículas, financeiro, turmas e muito mais numa só plataforma.{% endblock %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script src="{% static 'js/main.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
